<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EventMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
    <div class="header">
        EventMaster
    </div>

    <div class="flex-grow-1 d-flex">
        <div class="bg-light border-end" style="width: 220px;">
            <nav class="nav flex-column p-3">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'dashboard.index' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('dashboard.index') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.blueprint == 'events' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('events.index') }}">Events</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'registrations.index' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('registrations.index') }}">Registrations</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'speakers.index' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('speakers.index') }}">Speakers</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'reports.index' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('reports.index') }}">Reports</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.blueprint == 'settings' %} active-nav-link {% else %} hover-nav-link {% endif %}"
                                href="{{ url_for('settings.account') }}">Settings</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
        <div class="flex-grow-1 p-4">
            <h1 class="fw-bold title m-0 border-bottom">
                {% block page_title %}{% endblock %}
            </h1>
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
